<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gallery Mirare</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --white: #ffffff; --off-white: #f8f7f5; --light: #eeece8;
      --mid: #c8c4bc; --text-light: #999690; --text: #4a4845; --text-dark: #1e1d1b;
      --sans-logo: 'DM Sans', sans-serif;
    }
    body { font-family: 'DM Sans', sans-serif; background: var(--white); color: var(--text-dark); -webkit-font-smoothing: antialiased; }
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; justify-content: space-between; align-items: center;
      padding: 1.6rem 3rem; background: rgba(255,255,255,0.95); backdrop-filter: blur(8px);
      border-bottom: 0.5px solid var(--light);
    }
    .logo { font-family: var(--sans-logo); font-weight: 300; font-size: 16px; letter-spacing: 0.22em; color: var(--text-dark); text-decoration: none; }
    .nav-links { display: flex; gap: 2.5rem; list-style: none; }
    .nav-links a { font-size: 10px; letter-spacing: 0.2em; color: var(--text); text-decoration: none; transition: color 0.3s; }
    .nav-links a:hover { color: var(--text-dark); }
    .hamburger { display: none; flex-direction: column; gap: 5px; cursor: pointer; background: none; border: none; }
    .hamburger span { display: block; width: 22px; height: 0.5px; background: var(--text-dark); }
    .hero { padding-top: 80px; height: 100vh; display: flex; flex-direction: column; }
    .hero-image { flex: 1; background: var(--light); display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; }
    .hero-image img { width: 100%; height: 100%; object-fit: cover; position: absolute; inset: 0; }
    .hero-placeholder { text-align: center; color: var(--mid); font-size: 11px; letter-spacing: 0.15em; }
    .hero-text { padding: 2.5rem 3rem; border-top: 0.5px solid var(--light); display: flex; justify-content: space-between; align-items: flex-end; }
    .hero-tagline { font-family: var(--sans-logo); font-weight: 300; font-size: clamp(16px, 2vw, 22px); line-height: 1.9; color: var(--text-dark); letter-spacing: 0.04em; }
    .hero-sub { font-size: 10px; letter-spacing: 0.2em; color: var(--text-light); }
    footer { border-top: 0.5px solid var(--light); padding: 2rem 3rem; display: flex; justify-content: space-between; align-items: center; }
    .footer-logo { font-family: var(--sans-logo); font-size: 13px; font-weight: 300; letter-spacing: 0.2em; color: var(--text-light); }
    .footer-copy { font-size: 10px; letter-spacing: 0.14em; color: var(--text-light); }
    @media (max-width: 768px) {
      nav { padding: 1.4rem 1.5rem; }
      .nav-links { display: none; }
      .nav-links.open { display: flex; flex-direction: column; position: fixed; top: 60px; left: 0; right: 0; background: var(--white); padding: 2rem 1.5rem; border-bottom: 0.5px solid var(--light); gap: 1.8rem; z-index: 99; }
      .hamburger { display: flex; }
      .hero-text { flex-direction: column; gap: 1rem; padding: 2rem 1.5rem; }
      footer { flex-direction: column; gap: 0.8rem; text-align: center; padding: 1.5rem; }
    }
  </style>
</head>
<body>
<nav>
  <a href="index.html" class="logo"><img src="logo-small.png" alt="Gallery Mirar" style="height:32px; width:auto; display:block;"></a>
  <ul class="nav-links" id="navLinks">
    <li><a href="about.html">ABOUT</a></li>
    <li><a href="artists.html">ARTISTS</a></li>
    <li><a href="exhibition.html">EXHIBITION</a></li>
    <li><a href="contact.html">CONTACT</a></li>
  </ul>
  <button class="hamburger" id="hamburger" aria-label="메뉴"><span></span><span></span><span></span></button>
</nav>
<div class="hero">
  <div class="hero-image">
    <!-- 이미지: <img src="images/main.jpg" alt="Gallery Mirare"> -->
    <div class="hero-placeholder">MAIN IMAGE</div>
  </div>
  <div class="hero-text">
    <div class="hero-tagline">공간 안 감정의 결을 바꾸는 회화<br>현실을 잠시 다른 감각으로 바라보게 하는 장면</div>
    <div class="hero-sub">GALLERY MIRARE · SUWON</div>
  </div>
</div>
<footer>
  <div class="footer-logo"><img src="logo-small.png" alt="Gallery Mirar" style="height:22px; width:auto; opacity:0.5;"></div>
  <div class="footer-copy">© 2025 Gallery Mirare. All rights reserved.</div>
</footer>
<script>
  const hamburger = document.getElementById('hamburger');
  const navLinks = document.getElementById('navLinks');
  hamburger.addEventListener('click', () => navLinks.classList.toggle('open'));
</script>
</body>
</html>
