<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gallery Mirar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --white: #ffffff; --off-white: #f8f7f5; --light: #eeece8;
      --mid: #c8c4bc; --text-light: #999690; --text: #4a4845; --text-dark: #1e1d1b;
    }
    body { font-family: 'DM Sans', sans-serif; background: var(--white); color: var(--text-dark); -webkit-font-smoothing: antialiased; }

    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; justify-content: space-between; align-items: center;
      padding: 1.6rem 3rem;
      background: rgba(255,255,255,0.95); backdrop-filter: blur(8px);
      border-bottom: 0.5px solid var(--light);
    }
    .logo { text-decoration: none; }
    .nav-links { display: flex; gap: 2.5rem; list-style: none; }
    .nav-links a { font-size: 10px; letter-spacing: 0.2em; color: var(--text); text-decoration: none; transition: color 0.3s; }
    .nav-links a:hover { color: var(--text-dark); }
    .hamburger { display: none; flex-direction: column; gap: 5px; cursor: pointer; background: none; border: none; }
    .hamburger span { display: block; width: 22px; height: 0.5px; background: var(--text-dark); }

    .main-wrap {
      padding-top: 80px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding-left: 3rem;
      padding-right: 3rem;
      padding-bottom: 3rem;
    }

    /* 슬라이더 */
    .slider-wrap {
      width: min(480px, 80vw);
      aspect-ratio: 1;
      position: relative;
      overflow: hidden;
      background: var(--light);
      margin-top: 2rem;
    }

    .slide {
      position: absolute; inset: 0;
      opacity: 0;
      transition: opacity 0.8s ease;
    }
    .slide.active { opacity: 1; }
    .slide img { width: 100%; height: 100%; object-fit: cover; display: block; }

    .slider-dots {
      position: absolute;
      bottom: 12px; left: 0; right: 0;
      display: flex; justify-content: center; gap: 6px;
      z-index: 10;
    }
    .dot {
      width: 5px; height: 5px; border-radius: 50%;
      background: rgba(255,255,255,0.5);
      cursor: pointer; transition: background 0.3s; border: none;
    }
    .dot.active { background: rgba(255,255,255,0.95); }

    /* 텍스트 — 이미지 너비 기준 왼쪽 정렬 */
    .hero-text {
      width: min(480px, 80vw);
      margin-top: 2rem;
      text-align: left;
    }
    .hero-tagline {
      font-weight: 300;
      font-size: clamp(15px, 1.7vw, 20px);
      line-height: 2;
      color: var(--text-dark);
      letter-spacing: 0.02em;
    }
    .hero-sub {
      margin-top: 0.8rem;
      font-size: 10px;
      letter-spacing: 0.2em;
      color: var(--text-light);
    }

    footer {
      border-top: 0.5px solid var(--light);
      padding: 1.8rem 3rem;
      display: flex; justify-content: space-between; align-items: center;
    }
    .footer-copy { font-size: 10px; letter-spacing: 0.14em; color: var(--text-light); }

    @media (max-width: 768px) {
      nav { padding: 1.4rem 1.5rem; }
      .nav-links { display: none; }
      .nav-links.open { display: flex; flex-direction: column; position: fixed; top: 60px; left: 0; right: 0; background: var(--white); padding: 2rem 1.5rem; border-bottom: 0.5px solid var(--light); gap: 1.8rem; z-index: 99; }
      .hamburger { display: flex; }
      .main-wrap { padding-left: 1.5rem; padding-right: 1.5rem; }
      footer { flex-direction: column; gap: 0.8rem; text-align: center; padding: 1.5rem; }
    }
  </style>
</head>
<body>
<nav>
  <a href="index.html" class="logo"><img src="logo-small.png" alt="Gallery Mirar" style="height:42px; width:auto; display:block;"></a>
  <ul class="nav-links" id="navLinks">
    <li><a href="about.html">ABOUT</a></li>
    <li><a href="artists.html">ARTISTS</a></li>
    <li><a href="exhibition.html">EXHIBITION</a></li>
    <li><a href="contact.html">CONTACT</a></li>
  </ul>
  <button class="hamburger" id="hamburger" aria-label="메뉴"><span></span><span></span><span></span></button>
</nav>

<div class="main-wrap">
  <div class="slider-wrap">
    <div class="slide active"><img src="main1.jpg" alt="작품 1"></div>
    <div class="slide"><img src="main2.jpg" alt="작품 2"></div>
    <div class="slide"><img src="main3.jpg" alt="작품 3"></div>
    <div class="slide"><img src="main4.jpg" alt="작품 4"></div>
    <div class="slider-dots">
      <button class="dot active" data-i="0"></button>
      <button class="dot" data-i="1"></button>
      <button class="dot" data-i="2"></button>
      <button class="dot" data-i="3"></button>
    </div>
  </div>
  <div class="hero-text">
    <div class="hero-tagline">
      시선이 머무는 새로운 일상<br>
      Perspectives shape everyday life
    </div>
    <div class="hero-sub">Gallery Mirar</div>
  </div>
</div>

<footer>
  <div><img src="logo-small.png" alt="Gallery Mirar" style="height:20px; width:auto; opacity:0.4;"></div>
  <div class="footer-copy">© 2025 Gallery Mirar. All rights reserved.</div>
</footer>

<script>
  const hamburger = document.getElementById('hamburger');
  const navLinks = document.getElementById('navLinks');
  hamburger.addEventListener('click', () => navLinks.classList.toggle('open'));

  const slides = document.querySelectorAll('.slide');
  const dots = document.querySelectorAll('.dot');
  let current = 0;
  let timer;

  function goTo(n) {
    slides[current].classList.remove('active');
    dots[current].classList.remove('active');
    current = (n + slides.length) % slides.length;
    slides[current].classList.add('active');
    dots[current].classList.add('active');
  }

  function startTimer() { timer = setInterval(() => goTo(current + 1), 3500); }

  dots.forEach(dot => {
    dot.addEventListener('click', () => {
      clearInterval(timer);
      goTo(parseInt(dot.dataset.i));
      startTimer();
    });
  });

  startTimer();
</script>
</body>
</html>
