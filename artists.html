<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Artists — Gallery Mirar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --white: #ffffff; --off-white: #f8f7f5; --light: #eeece8;
      --mid: #c8c4bc; --text-light: #999690; --text: #4a4845; --text-dark: #1e1d1b;
      --sans-logo: 'DM Sans', sans-serif;
    }
    body { font-family: 'DM Sans', sans-serif; background: var(--white); color: var(--text-dark); -webkit-font-smoothing: antialiased; }
    nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; display: flex; justify-content: space-between; align-items: center; padding: 1.6rem 3rem; background: rgba(255,255,255,0.95); backdrop-filter: blur(8px); border-bottom: 0.5px solid var(--light); }
    .logo { font-family: var(--sans-logo); font-weight: 300; font-size: 16px; letter-spacing: 0.22em; color: var(--text-dark); text-decoration: none; }
    .nav-links { display: flex; gap: 2.5rem; list-style: none; }
    .nav-links a { font-size: 10px; letter-spacing: 0.2em; color: var(--text); text-decoration: none; transition: color 0.3s; }
    .nav-links a:hover, .nav-links a.active { color: var(--text-dark); }
    .hamburger { display: none; flex-direction: column; gap: 5px; cursor: pointer; background: none; border: none; }
    .hamburger span { display: block; width: 22px; height: 0.5px; background: var(--text-dark); }
    main { padding-top: 80px; }
    .page-header { padding: 4rem 3rem 2rem; border-bottom: 0.5px solid var(--light); }
    .page-label { font-size: 10px; letter-spacing: 0.25em; color: var(--text-light); margin-bottom: 1rem; }
    .page-title { font-family: var(--sans-logo); font-weight: 300; font-size: clamp(28px, 4vw, 44px); letter-spacing: 0.08em; color: var(--text-dark); }
    .content { padding: 4rem 3rem; }
    .artists-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2.5rem; }
    .artist-card { text-decoration: none; display: block; cursor: pointer; }
    .artist-img {
      background: var(--off-white); border: 0.5px solid var(--light);
      aspect-ratio: 3/4; display: flex; align-items: center; justify-content: center;
      color: var(--mid); font-size: 11px; letter-spacing: 0.1em;
      margin-bottom: 1.2rem; overflow: hidden; position: relative;
    }
    .artist-img img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.6s ease; }
    .artist-card:hover .artist-img img { transform: scale(1.03); }
    .artist-img-overlay {
      position: absolute; inset: 0; background: rgba(30,29,27,0); 
      display: flex; align-items: flex-end; padding: 1.2rem;
      transition: background 0.4s;
    }
    .artist-card:hover .artist-img-overlay { background: rgba(30,29,27,0.08); }
    .artist-name { font-family: var(--sans-logo); font-size: 18px; font-weight: 300; letter-spacing: 0.08em; color: var(--text-dark); margin-bottom: 0.4rem; }
    .artist-keyword { font-size: 11px; letter-spacing: 0.14em; color: var(--text-light); }
    footer { border-top: 0.5px solid var(--light); padding: 2rem 3rem; display: flex; justify-content: space-between; align-items: center; margin-top: 4rem; }
    .footer-logo { font-family: var(--sans-logo); font-size: 13px; font-weight: 300; letter-spacing: 0.2em; color: var(--text-light); }
    .footer-copy { font-size: 10px; letter-spacing: 0.14em; color: var(--text-light); }
    @media (max-width: 768px) {
      nav { padding: 1.4rem 1.5rem; }
      .nav-links { display: none; }
      .nav-links.open { display: flex; flex-direction: column; position: fixed; top: 60px; left: 0; right: 0; background: var(--white); padding: 2rem 1.5rem; border-bottom: 0.5px solid var(--light); gap: 1.8rem; z-index: 99; }
      .hamburger { display: flex; }
      .page-header { padding: 3rem 1.5rem 2rem; }
      .content { padding: 3rem 1.5rem; }
      .artists-grid { grid-template-columns: repeat(2, 1fr); gap: 1.5rem; }
      footer { flex-direction: column; gap: 0.8rem; text-align: center; padding: 1.5rem; }
    }
  </style>
</head>
<body>
<nav>
  <a href="index.html" class="logo"><img src="logo-small.png" alt="Gallery Mirar" style="height:42px; width:auto; display:block;"></a>
  <ul class="nav-links" id="navLinks">
    <li><a href="about.html">ABOUT</a></li>
    <li><a href="exhibition.html">EXHIBITION</a></li>
    <li><a href="artists.html" class="active">ARTISTS</a></li>
    <li><a href="contact.html">CONTACT</a></li>
  </ul>
  <button class="hamburger" id="hamburger" aria-label="메뉴"><span></span><span></span><span></span></button>
</nav>
<main>
  <div class="page-header">
    <div class="page-label">ARTISTS</div>
    <div class="page-title">Our Artists</div>
  </div>
  <div class="content">
    <div class="artists-grid">

      <!-- 작가 카드 샘플 A — 복사해서 작가 추가 -->
      <a class="artist-card" href="artist-a.html">
        <div class="artist-img">
          <!-- <img src="images/artist-a.jpg" alt="작가 A"> -->
          <div class="artist-img-overlay"></div>
          ARTIST IMAGE
        </div>
        <div class="artist-name">작가 A</div>
        <div class="artist-keyword">감정 · 기억</div>
      </a>

      <!-- 작가 카드 샘플 B -->
      <a class="artist-card" href="artist-b.html">
        <div class="artist-img">
          <!-- <img src="images/artist-b.jpg" alt="작가 B"> -->
          <div class="artist-img-overlay"></div>
          ARTIST IMAGE
        </div>
        <div class="artist-name">작가 B</div>
        <div class="artist-keyword">공간 · 반복</div>
      </a>

      <!-- 작가 카드 샘플 C -->
      <a class="artist-card" href="artist-c.html">
        <div class="artist-img">
          <!-- <img src="images/artist-c.jpg" alt="작가 C"> -->
          <div class="artist-img-overlay"></div>
          ARTIST IMAGE
        </div>
        <div class="artist-name">작가 C</div>
        <div class="artist-keyword">공존 · 현실</div>
      </a>

    </div>
  </div>
</main>
<footer>
  <div class="footer-logo"><img src="logo-small.png" alt="Gallery Mirar" style="height:22px; width:auto; opacity:0.5;"></div>
  <div class="footer-copy">© 2025 Gallery Mirar. All rights reserved.</div>
</footer>
<script>
  const hamburger = document.getElementById('hamburger');
  const navLinks = document.getElementById('navLinks');
  hamburger.addEventListener('click', () => navLinks.classList.toggle('open'));
</script>
</body>
</html>
